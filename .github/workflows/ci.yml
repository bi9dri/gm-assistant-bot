name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version: "1.3.11"
      - run: bun install --frozen-lockfile
      - run: bun run --bun typecheck
      - run: bun run --bun test
      - run: bun run --bun lint

  vrt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version: "1.3.11"
      - run: bun install --frozen-lockfile
      # Cache Playwright browser binaries (~280MB chromium). Key on lockfile
      # so cache invalidates whenever @playwright/test version changes.
      - id: playwright-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: frontend
        run: bun x playwright install --with-deps chromium
      - if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: frontend
        run: bun x playwright install-deps chromium
      # Storybook static build is required by the storybook-static webServer
      # in playwright.config.ts (chromium-storybook project reads index.json
      # from frontend/storybook-static/).
      - run: bun run --bun --filter gm-assistant-bot-frontend build-storybook
      - run: bun run --bun --filter gm-assistant-bot-frontend test:vrt
      - if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: vrt-diff
          path: frontend/test-results/
          retention-days: 14
          if-no-files-found: ignore
